<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Blog Page</title>

    <!-- Google Poppins Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Google Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Font Awesome Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- To add my css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="home" class="header">
        <div class="container header-sub-container">
            <nav class="navbar">
                <div class="logo">
                    <a href="">
                        <i class="fa-brands fa-web-awesome"></i>
                        <span>ONTARIO</span>
                    </a>
                </div>
                <div class="nav-links">
                    <ul>
                        <li><a class="n-link" href="#home">Home</a></li>
                        <li><a class="n-link" href="#blog">Blog</a></li>
                        <li><a class="n-link" href="#features">Features</a></li>
                        <li><a class="n-link" href="#about">About</a></li>
                        <li><a class="n-link" href="#contact">Contact</a></li>
                    </ul>
                </div>
                <div class="link-bar">
                    <span class="material-symbols-outlined">
                        search
                    </span>
                    <span class="material-symbols-outlined">
                        brightness_4
                    </span>
                    <span class="material-symbols-outlined">
                        dark_mode
                    </span>
                </div>
            </nav>
        </div>
    </header>
</body>

</html>
