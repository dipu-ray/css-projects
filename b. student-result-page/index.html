<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>

    <!-- Playfair Display Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <!-- To add my css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <!--Start Section One -->
        <section class="section-one">
            <div class="academy-name">
                <div class="left">
                    <h1>Greenfield Academy</h1>
                    <p>Department of Academic Affairs · Dhaka</p>
                </div>
                <div class="right">
                    <span>Semester Report</span>
                </div>
            </div>
            <div class="name-container">
                <div class="nm-circle">
                    <h1>DR</h1>
                </div>
                <div class="full-name">
                    <div>
                        <h1>Dipu Ray</h1>
                    </div>
                    <div class="std-info">
                        <div class="sub-std-info">
                            <span>Student ID</span>
                            <p>GFA-2024-0847</p>
                        </div>
                        <div class="sub-std-info">
                            <span>Class</span>
                            <p>Grade 10 — Section B</p>
                        </div>
                        <div class="sub-std-info">
                            <span>Exam</span>
                            <p>Final Examination 2024</p>
                        </div>
                        <div class="sub-std-info">
                            <span>Published</span>
                            <p>March 19, 2026</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!--End Section One -->

        <!--Start Section Two -->
        <section class="section-two">
            <div class="numeric-container">
                <h1 class="marks">547</h1>
                <p>Total Marks</p>
            </div>
            <div class="vertical-bar"></div>
            <div class="numeric-container">
                <h1 class="percentage">78.1%</h1>
                <p>Percentage</p>
            </div>
            <div class="vertical-bar"></div>
            <div class="numeric-container">
                <h1 class="cls-rank">4th</h1>
                <p>Class Rank</p>
            </div>
            <div class="vertical-bar"></div>
            <div class="numeric-container">
                <h1 class="gpa">3.72</h1>
                <p>GPA</p>
            </div>
        </section>
        <!--End Section Two -->
    </main>
</body>

</html>
